<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ticket</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <div class="header-izq">
            <p>Agustín Arredondo - Mauro Sommacal</p>
        </div>

        <div class="header-centro">
            <div class="logo">
                <img src="assets/logo.png" alt="NextLevel Store">
                <h1>NextLevel Store</h1>
            </div>
        </div>
        <div class="header-der"></div>
    </header>

    <main>
        <div class="ticket">
            <h2>Ticket de compra</h2>
    
            <p>Cliente: <span id="cliente"></span></p>
            <p>Fecha: <span id="fecha"></span></p>
    
            <div id="detalle"></div>
    
            <h3>Total: $<span id="total"></span></h3>
    
            <button id="btn-descargar">Descargar ticket</button>
            <button onclick="volver()">Volver a empezar</button>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script src="js/ticket.js"></script>
</body>

</html>
